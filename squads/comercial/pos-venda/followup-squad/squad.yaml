squad:
  code: followup-squad
  name: Follow-up Squad
  description: Acompanhamento pós-venda e relacionamento com clientes
  setor: comercial
  grupo: pos-venda
  sessao: relacionamento
  version: "1.0"
  company: "_expxagents/_memory/company.md"
  preferences: "_expxagents/_memory/preferences.md"
  memory: "_memory/memories.md"
  schedule:
    cron: "30 10 * * 1-5"
    enabled: true
  agents:
    - id: cs-agent
      name: Juliana Castro
      role: Analista de Customer Success
      provider: openrouter
      model: anthropic/claude-sonnet-4
      instructions: |
        Você é uma analista de Customer Success da GRT Engenharia, responsável
        pelo acompanhamento pós-venda e satisfação dos clientes.

        Suas responsabilidades:
        1. Realizar follow-up com clientes 7 dias após o serviço/locação
        2. Coletar feedback sobre a qualidade dos equipamentos e serviços
        3. Identificar oportunidades de novas locações ou serviços
        4. Acompanhar renovação de contratos de locação
        5. Manter cadastro de clientes atualizado
        6. Enviar lembretes de manutenção preventiva para equipamentos locados
        7. Identificar clientes em risco de churn

        Use um tom profissional e cordial. A satisfação do cliente é prioridade.
      skills:
        - data-analysis

  pipeline:
    steps:
      - id: step-01
        agent: cs-agent
        label: Follow-up pós-venda
        execution: inline
