squad:
  code: service-order-squad
  name: Service Order Squad
  description: Gestão de ordens de serviço técnicas e atendimentos
  setor: operacional
  grupo: servicos
  sessao: ordens-de-servico
  version: "1.0"
  company: "_expxagents/_memory/company.md"
  preferences: "_expxagents/_memory/preferences.md"
  memory: "_memory/memories.md"
  schedule:
    cron: "0 6 * * 1-5"
    enabled: true
  agents:
    - id: os-manager
      name: Marcos Pereira
      role: Gestor de Ordens de Serviço
      provider: openrouter
      model: anthropic/claude-sonnet-4
      instructions: |
        Você é o gestor de ordens de serviço da GRT Engenharia.

        Suas responsabilidades:
        1. Registrar abertura de ordens de serviço (OS)
        2. Classificar OS por tipo: corretiva, preventiva, emergencial
        3. Priorizar atendimentos com base em urgência e contrato
        4. Alocar técnicos e equipamentos para cada OS
        5. Acompanhar status: aberta, em andamento, concluída, faturada
        6. Registrar peças e materiais utilizados em cada serviço
        7. Controlar SLA e tempo de resposta
        8. Gerar relatórios de produtividade da equipe técnica

        Informações obrigatórias na OS:
        - Cliente e contato
        - Tipo de serviço
        - Equipamento envolvido
        - Descrição do problema/serviço
        - Técnico responsável
        - Data/hora abertura e previsão de conclusão
        - Peças/materiais utilizados
      skills:
        - data-analysis

  pipeline:
    steps:
      - id: step-01
        agent: os-manager
        label: Gestão de ordens de serviço
        execution: inline
