    - heading "Arquitetura" [level=1] [ref=e70]
    - paragraph [ref=e71]: "ExpxAgents é um monorepo com 7 pacotes independentes:"
    - generic [ref=e72]:
      - generic [ref=e73]: text
      - code [ref=e74]: "expxagents/ ├── server/ # API REST + WebSocket (Fastify 5, SQLite) ├── dashboard/ # SPA React (React 19, Vite, Zustand, Pixi.js) ├── core/ # Engine TypeScript (squad-loader, state-manager) ├── cli/ # CLI Commander.js (expxagents command) ├── knowledge/ # GraphRAG Knowledge System ├── packages/ │ ├── registry-client/ # SDK para global squad registry │ └── agent-cli/ # AI coding agent com tool use (@expxagents/agent) └── squads/ # Configurações de squads (YAML)"
    - list [ref=e75]:
      - listitem [ref=e76]:
        - generic [ref=e77]: ▸
        - generic [ref=e78]:
          - strong [ref=e79]: server
          - text: — Fastify 5 com SQLite. Gerencia autenticação JWT, WebSocket, file-watcher, scheduler, engine de email e bridge com Claude Code.
      - listitem [ref=e80]:
        - generic [ref=e81]: ▸
        - generic [ref=e82]:
          - strong [ref=e83]: dashboard
          - text: — SPA React 19 com Zustand 5, Pixi.js 8 para Office View e comunicação via WebSocket.
      - listitem [ref=e84]:
        - generic [ref=e85]: ▸
        - generic [ref=e86]:
          - strong [ref=e87]: core
          - text: — Biblioteca pura TypeScript. Parse de squad.yaml, gerenciamento de estado do pipeline e carregamento de skills.
      - listitem [ref=e88]:
        - generic [ref=e89]: ▸
        - generic [ref=e90]:
          - strong [ref=e91]: cli
          - text: — Pacote npm (
          - code [ref=e92]: expxagents
          - text: ). Contém todos os comandos do usuário final.
