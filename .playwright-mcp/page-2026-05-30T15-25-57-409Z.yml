    - heading "ExpxAgents" [level=1] [ref=e22]
    - paragraph [ref=e23]:
      - strong [ref=e24]: ExpxAgents
      - text: é uma plataforma de orquestração de múltiplos agentes de IA. Permite criar squads de agentes especializados que executam pipelines, se comunicam entre si, agendam tarefas e geram resultados de forma autônoma — tudo gerenciado via uma interface web e CLI.
    - list [ref=e25]:
      - listitem [ref=e26]:
        - generic [ref=e27]: ▸
        - generic [ref=e28]: Squads de agentes em YAML — configuração simples, execução poderosa
      - listitem [ref=e29]:
        - generic [ref=e30]: ▸
        - generic [ref=e31]: Hierarquia Setor → Grupo → Sessão → Squad para organização empresarial
      - listitem [ref=e32]:
        - generic [ref=e33]: ▸
        - generic [ref=e34]: Pipeline com checkpoints, kanban automático e rastreamento de steps
      - listitem [ref=e35]:
        - generic [ref=e36]: ▸
        - generic [ref=e37]: Scheduler integrado com cron jobs por squad
      - listitem [ref=e38]:
        - generic [ref=e39]: ▸
        - generic [ref=e40]: Dashboard de operações em tempo real (KPIs, gráficos, agentes)
      - listitem [ref=e41]:
        - generic [ref=e42]: ▸
        - generic [ref=e43]: Webhooks para integração com sistemas externos
      - listitem [ref=e44]:
        - generic [ref=e45]: ▸
        - generic [ref=e46]: Engine de Email (SES) com campanhas e rastreamento
      - listitem [ref=e47]:
        - generic [ref=e48]: ▸
        - generic [ref=e49]: Suporte a Claude (Anthropic), OpenAI e providers customizados
    - heading "Quick Start" [level=1] [ref=e50]
