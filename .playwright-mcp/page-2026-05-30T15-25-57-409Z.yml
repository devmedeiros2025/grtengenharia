    - generic [ref=e61]:
      - generic [ref=e62]: bash
      - code [ref=e63]: "# Criar novo projeto ExpxAgents expxagents init meu-projeto cd meu-projeto # Criar sua primeira squad expxagents create minha-squad # Instalar a skill de onboarding expxagents install"
    - heading "Rodando o servidor" [level=2] [ref=e64]
    - generic [ref=e65]:
      - generic [ref=e66]: bash
      - code [ref=e67]: "# Modo desenvolvimento (server + dashboard) npm run dev # Modo produção npm start # Com tunnel para acesso remoto expxagents server --tunnel # Acesse: http://localhost:3001"
